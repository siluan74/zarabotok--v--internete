    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoWay - Заработок на кранах и буксах</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        header { background: linear-gradient(90deg, #1e293b, #334155); padding: 20px; text-align: center; border-bottom: 2px solid #38bdf8; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { border-color: #38bdf8; transform: translateY(-5px); }
        h1 { color: #38bdf8; margin: 0; }
        .badge { background: #38bdf8; color: #0f172a; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .btn { display: inline-block; background: #38bdf8; color: #0f172a; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .info { font-size: 0.9em; color: #94a3b8; }
    </style>
